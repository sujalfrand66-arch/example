databases:
  - name: laravel_db
    databaseName: laravel
    user: laravel_user
    plan: free

services:
  - type: web
    name: laravel-app
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan key:generate --force
      php artisan migrate --force
      php artisan storage:link
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_NAME
        value: LaravelApp
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://laravel-app.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: laravel_db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laravel_db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: laravel_db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: laravel_db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laravel_db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: LOG_CHANNEL
        value: stderr
